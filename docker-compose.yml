# Cracking the Code — the lab.
#
# One toolbox service: `crackstation`. It can reach BOTH:
#   - the internet  -> for C9, the online Dillon's Cookie Shop at cookies.0byte.sh
#   - vuln-login     -> for C6, Hydra over SSH (on the shared lab network)
# Everything the challenges use is local synthetic data (toy hashes, fake users).
#
# Quick start:
#   docker compose build            # or: docker compose pull
#   docker compose up -d vuln-login          # start the Hydra SSH target (C6)
#   docker compose run --rm crackstation      # drop into the toolbox
#   # C9 (online):  hydra -l dillon -P /lab/wordlists/cookie-wordlist.txt \
#   #   cookies.0byte.sh -s 443 https-post-form \
#   #   "/login:username=^USER^&password=^PASS^:F=Invalid credentials"
# Teardown (removes everything, including volumes):
#   docker compose down -v

services:
  crackstation:
    build: .
    # Published to GHCR so attendees can `docker pull` instead of building.
    image: ghcr.io/bytetheio/crackstation:latest
    platform: linux/amd64   # amd64 image; runs via emulation on Apple Silicon
    container_name: crackstation
    hostname: crackstation
    networks: [cracklab]
    volumes:
      - ./:/lab:ro            # repo lab files (hashes, wordlists, rules) read-only
      - ./work:/work          # your writable loot dir (bind-mounted to the host)
    working_dir: /work
    stdin_open: true
    tty: true
    depends_on: [vuln-login]
    command: /bin/bash

  vuln-login:
    build: ./hydra-target
    image: ghcr.io/bytetheio/vuln-login:latest
    platform: linux/amd64
    container_name: vuln-login
    hostname: vuln-login
    networks: [cracklab]
    # NOTE: intentionally NO published `ports:` — it's reachable only from
    # crackstation over the lab network, never exposed inbound to your LAN.

networks:
  # A normal bridge (NOT internal) so crackstation has internet egress for C9.
  # Left unnamed so Compose always creates/manages it fresh — avoids reusing a
  # stale `cracklab` network that an earlier (internal-only) version may have left
  # behind on your machine. vuln-login is still reached by its hostname, so C6
  # is unaffected.
  cracklab:
    driver: bridge
