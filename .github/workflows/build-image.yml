name: Build & publish lab images

# Builds the crackstation + vuln-login images in the cloud and publishes them to
# GitHub Container Registry (GHCR), so attendees can `docker pull` instead of building.
# Uses the built-in GITHUB_TOKEN — no personal access token needed.

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: read
  packages: write           # required to push to GHCR

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: crackstation
            context: .
            file: ./Dockerfile
          - name: vuln-login
            context: ./hydra-target
            file: ./hydra-target/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # crackstation is ~4.8 GB; reclaim runner disk so the build doesn't run out.
      - name: Free up disk space
        if: matrix.name == 'crackstation'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          # lowercase owner is required by GHCR; bytetheio is already lowercase
          tags: |
            ghcr.io/bytetheio/${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/bytetheio/crackstation
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=Cracking the Code lab image (DC256 x NAC-ISSA)
          provenance: false
